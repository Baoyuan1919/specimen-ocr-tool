name: 打包 Windows 安装程序

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install rapidocr-onnxruntime openpyxl Pillow pyinstaller

    - name: 验证导入
      run: python -c "from rapidocr_onnxruntime import RapidOCR; import openpyxl; print('✅ 所有库导入成功')"

    - name: 打包为单文件 EXE
      run: |
        pyinstaller --onefile --noconsole --name "标本OCR填表工具" main.py

    - name: 检查构建产物
      run: |
        $f = "dist/标本OCR填表工具.exe"
        if (Test-Path $f) {
          $s = [math]::Round((Get-Item $f).Length / 1MB, 1)
          Write-Host "✅ 构建成功！EXE 大小: $s MB"
        } else {
          Write-Host "❌ 产物未找到"
          exit 1
        }

    - name: 上传 EXE
      uses: actions/upload-artifact@v4
      with:
        name: 标本OCR填表工具
        path: dist/标本OCR填表工具.exe

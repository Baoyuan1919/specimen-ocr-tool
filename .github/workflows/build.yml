name: 打包 Windows 安装程序

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x64'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install paddlepaddle==2.6.1 paddleocr==2.8.1 openpyxl Pillow pyinstaller

    - name: 打包为单文件 EXE
      run: |
        pyinstaller --onefile --noconsole --name "标本OCR填表工具" `
          --hidden-import paddleocr `
          --hidden-import paddle `
          --hidden-import openpyxl `
          --hidden-import PIL `
          --hidden-import PIL.ImageTk `
          --collect-all paddleocr `
          --collect-all paddle `
          main.py

    - name: 检查构建产物
      run: |
        if (Test-Path "dist/标本OCR填表工具.exe") {
          $size = (Get-Item "dist/标本OCR填表工具.exe").Length / 1MB
          Write-Host "✅ 构建成功！EXE 大小: $([math]::Round($size, 1)) MB"
        } else {
          Write-Host "❌ 构建产物未找到"
          exit 1
        }

    - name: 上传 EXE 构建产物
      uses: actions/upload-artifact@v4
      with:
        name: 标本OCR填表工具
        path: dist/标本OCR填表工具.exe

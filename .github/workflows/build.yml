name: 打包 Windows 安装程序

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install paddlepaddle==2.6.1 paddleocr==2.8.1 openpyxl Pillow pyinstaller
      shell: cmd

    - name: 验证导入
      run: python -c "import paddleocr; import openpyxl; print('All imports OK')"
      shell: cmd

    - name: 打包（onedir模式，更稳定）
      run: |
        pyinstaller --onedir --noconsole --name "标本OCR填表工具" `
          --hidden-import paddleocr `
          --hidden-import paddle `
          --hidden-import openpyxl `
          --hidden-import PIL.ImageTk `
          main.py
      shell: cmd

    - name: 制作压缩包
      run: |
        powershell Compress-Archive -Path dist\标本OCR填表工具 -DestinationPath 标本OCR填表工具.zip -Force

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: 标本OCR填表工具
        path: 标本OCR填表工具.zip

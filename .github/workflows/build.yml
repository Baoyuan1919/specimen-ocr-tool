name: 打包 Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: pip install rapidocr-onnxruntime openpyxl pillow pystray pyinstaller
      shell: cmd

    - name: 验证导入
      run: python -c "from rapidocr_onnxruntime import RapidOCR; print('OK')"
      shell: cmd

    - name: 打包（onedir + collect-all 含数据文件）
      run: pyinstaller --onedir --noconsole --name "标本OCR填表工具" --collect-all rapidocr_onnxruntime --collect-all openpyxl --collect-all PIL main.py
      shell: cmd

    - name: 确认 EXE 存在
      run: dir dist\标本OCR填表工具\标本OCR填表工具.exe
      shell: cmd

    - name: 打包成 tar.gz
      run: tar -czf specimen-ocr-tool.tar.gz -C dist 标本OCR填表工具
      shell: cmd

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: 标本OCR填表工具
        path: specimen-ocr-tool.tar.gz

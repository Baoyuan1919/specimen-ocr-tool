name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 打包为 EXE
      run: |
        pyinstaller --onefile --noconsole --name "OCR填表工具" --icon NUL main.py || ^
        pyinstaller --onefile --noconsole --name "OCR填表工具" main.py

    - name: 上传 EXE 到构建产物
      uses: actions/upload-artifact@v4
      with:
        name: OCR填表工具-Windows
        path: dist/OCR填表工具.exe

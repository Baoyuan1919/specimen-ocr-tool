name: 打包 Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install rapidocr-onnxruntime openpyxl Pillow pystray pyinstaller
      shell: cmd

    - name: 验证导入
      run: python -c "from rapidocr_onnxruntime import RapidOCR; import openpyxl; from PIL import Image; import pystray; print('OK')"
      shell: cmd

    - name: 打包（onedir模式，含所有数据文件）
      run: |
        pyinstaller --onedir --noconsole --name "标本OCR填表工具" ^
          --collect-all rapidocr_onnxruntime ^
          --collect-all openpyxl ^
          --collect-all PIL ^
          main.py
      shell: cmd

    - name: 验证数据文件是否包含
      run: |
        dir dist\标本OCR填表工具\rapidocr_onnxruntime\
        if exist dist\标本OCR填表工具\rapidocr_onnxruntime\config.yaml ( echo ✅ config.yaml 已包含 ) else ( echo ⚠️ config.yaml 缺失 )
      shell: cmd

    - name: 打包产物
      run: |
        cd dist
        tar -czf ../标本OCR填表工具.tar.gz 标本OCR填表工具\
        cd ..
      shell: cmd

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: 标本OCR填表工具
        path: 标本OCR填表工具.tar.gz

name: 打包 Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install rapidocr-onnxruntime>=1.3.22 openpyxl Pillow pystray pyinstaller
      shell: cmd

    - name: 验证导入
      run: python -c "from rapidocr_onnxruntime import RapidOCR; import openpyxl; from PIL import Image; import pystray; print('OK')"
      shell: cmd

    - name: 打包成单文件 EXE
      run: pyinstaller --onefile --noconsole --name "标本OCR填表工具" main.py
      shell: cmd

    - name: 检查产物
      run: |
        if exist dist\标本OCR填表工具.exe ( echo ✅ 构建成功 ) else ( exit /b 1 )
      shell: cmd

    - name: 上传 EXE
      uses: actions/upload-artifact@v4
      with:
        name: 标本OCR填表工具
        path: dist\标本OCR填表工具.exe
